# Test profile configuration
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.datasource.platform=h2

# H2 Database settings
spring.h2.console.enabled=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# JWT Configuration for Testing
app.jwt.secret=dGVzdF9zZWNyZXRfa2V5X2Zvcl90ZXN0aW5nX29ubHlfbXVzdF9iZV9hdF9sZWFzdF8zMl9jaGFyYWN0ZXJzX2xvbmc=
app.jwt.expiration=3600
app.jwt.refresh-expiration=7200

# CORS Configuration for Testing
app.cors.allowed-origins=http://localhost:3000,http://localhost:8080
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
app.cors.allowed-headers=*
app.cors.allow-credentials=true

# Disable OAuth2 for testing (use mock)
spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret

# Logging Configuration for Tests
logging.level.com.anuj.QuickScribe=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Disable unnecessary features for testing
spring.jpa.open-in-view=false
server.servlet.session.cookie.secure=false
